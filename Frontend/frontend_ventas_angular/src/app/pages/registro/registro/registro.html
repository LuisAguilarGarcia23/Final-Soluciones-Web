<div class="auth-card mx-auto">
  <h2 class="mb-2">Registro</h2>
  <p class="text-muted mb-4">Crea una cuenta como usuario o vendedor.</p>

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  @if (success()) {
    <div class="alert alert-success">{{ success() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="registrar()">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input class="form-control" formControlName="name" placeholder="Tu nombre completo">
    </div>

    <div class="mb-3">
      <label class="form-label">Correo</label>
      <input class="form-control" type="email" formControlName="email" placeholder="correo@gmail.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input class="form-control" type="password" formControlName="password" placeholder="Mínimo 6 caracteres">
    </div>

    <div class="mb-3">
      <label class="form-label">Rol</label>
      <select class="form-select" formControlName="rol">
        <option value="USUARIO">Usuario</option>
        <option value="VENDEDOR">Vendedor</option>
      </select>
      <small class="text-muted">El rol ADMIN no está disponible en el registro público.</small>
    </div>

    <button class="btn btn-success w-100" type="submit" [disabled]="loading()">
      @if (loading()) {
        Registrando...
      } @else {
        Registrarme
      }
    </button>
  </form>

  <p class="mt-3 mb-0 text-center">
    ¿Ya tienes cuenta?
    <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
